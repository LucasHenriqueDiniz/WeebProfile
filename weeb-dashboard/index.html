<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeebProfile</title>
    <script>
      // Aplica o tema (dark/light) antes do primeiro paint para evitar flash de tema errado
      // (o ThemeProvider real só roda depois que o React monta e o zustand reidrata).
      ;(function () {
        try {
          var stored = localStorage.getItem("theme-storage")
          var theme = stored ? JSON.parse(stored)?.state?.theme : null
          var resolved =
            theme === "light" || theme === "dark"
              ? theme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
          document.documentElement.classList.add(resolved)
        } catch (e) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
