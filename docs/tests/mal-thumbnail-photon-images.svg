<svg width="360" height="160" viewBox="0 0 360 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MAL thumbnail+Photon test</title>
  <desc id="desc">Same 4 real MyAnimeList covers, small_image_url source (50x74 native) processed through the real embedImage() pipeline (Photon decode/resize/re-encode to 75x120 JPEG), the winning strategy actually implemented. One cover (index 0, Frieren) fails Photon decode even from this byte-identical source and is shown as a labeled empty slot, not a broken image icon.</desc>
  <rect width="360" height="160" fill="#0d1117"/>
  <text x="10" y="20" fill="#c9d1d9" font-family="sans-serif" font-size="12">Small thumbnail + Photon (real embedImage() winning strategy)</text>
  <rect x="10" y="30" width="75" height="120" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="47" y="85" fill="#f85149" font-family="sans-serif" font-size="9" text-anchor="middle">Photon</text>
  <text x="47" y="97" fill="#f85149" font-family="sans-serif" font-size="9" text-anchor="middle">decode</text>
  <text x="47" y="109" fill="#f85149" font-family="sans-serif" font-size="9" text-anchor="middle">failed</text>
  <image href="data:image/jpeg;base64," x="95" y="30" width="75" height="120"/>
  <image href="data:image/jpeg;base64," x="180" y="30" width="75" height="120"/>
  <image href="data:image/jpeg;base64," x="265" y="30" width="75" height="120"/>
</svg>
