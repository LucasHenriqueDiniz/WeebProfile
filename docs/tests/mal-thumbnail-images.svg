<svg width="360" height="160" viewBox="0 0 360 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MAL thumbnail direct test</title>
  <desc id="desc">Same 4 real MyAnimeList covers, small_image_url source (50x74 native), raw JPEG bytes base64-encoded directly with no decode/resize/Photon, rendered at 75x120.</desc>
  <rect width="360" height="160" fill="#0d1117"/>
  <text x="10" y="20" fill="#c9d1d9" font-family="sans-serif" font-size="12">Direct thumbnail (small_image_url, no WASM, upscaled 50x74 to 75x120)</text>
  <image href="data:image/jpeg;base64," x="10" y="30" width="75" height="120"/>
  <image href="data:image/jpeg;base64," x="95" y="30" width="75" height="120"/>
  <image href="data:image/jpeg;base64," x="180" y="30" width="75" height="120"/>
  <image href="data:image/jpeg;base64," x="265" y="30" width="75" height="120"/>
</svg>