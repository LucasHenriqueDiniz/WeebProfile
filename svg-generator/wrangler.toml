name = "weeb-svg-generator"
main = "src/worker.ts"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# D1 Database binding (read-only access to plugin_secrets)
# Same database as weeb-dashboard/wrangler.toml
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "weebprofile-db"
database_id = "c7eb434d-7ca2-4c5c-bf63-943e38e46158"

[[services]]
binding = "JIKAN_EDGE"
service = "jikan-edge"

# ============================================================
# Daily SVG regeneration (replaces the old GitHub Actions cron).
# Calls weeb-dashboard's /api/cron/generate-svgs on schedule; see
# the scheduled() handler in src/worker.ts.
# CRON_SECRET is set via `wrangler secret put CRON_SECRET` (not here).
# ============================================================
[triggers]
crons = ["7 3 * * *"]

[vars]
DASHBOARD_URL = "https://weebprofile-dashboard.pages.dev"
JIKAN_EDGE_BASE_URL = "https://jikan-edge.lucas-hdo.workers.dev"
