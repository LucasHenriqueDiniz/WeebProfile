name: Generate SVGs Cron

on:
  schedule:
    # Roda às 3h07 da manhã UTC (00h07 horário de Brasília)
    - cron: "7 3 * * *"
  workflow_dispatch: # Permite execução manual no GitHub

jobs:
  generate-svgs:
    runs-on: ubuntu-latest
    steps:
      - name: Regenerate all due SVGs (loop)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DASHBOARD_URL: https://weebprofile-dashboard.pages.dev
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "❌ CRON_SECRET não configurado"
            exit 1
          fi

          echo "🔗 Dashboard URL: ${DASHBOARD_URL}"

          PROCESSED=0
          START_TIME=$(date +%s)

          # Loop até um lote vir com menos de 50 (limit da Pages Function) = não há mais trabalho
          for i in {1..20}; do
            echo "📦 Run $i"

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            ELAPSED_MIN=$((ELAPSED / 60))
            ELAPSED_SEC=$((ELAPSED % 60))

            echo "⏱️  Elapsed: ${ELAPSED_MIN}m ${ELAPSED_SEC}s | Processed so far: ${PROCESSED}"

            RES=$(curl -fsS --retry 5 --retry-all-errors --max-time 420 \
              -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              "${DASHBOARD_URL}/api/cron/generate-svgs" || echo '{"success":false,"processed":0}')

            echo "$RES"

            BATCH=$(echo "$RES" | grep -o '"processed":[0-9]*' | cut -d':' -f2)
            BATCH=${BATCH:-0}
            PROCESSED=$((PROCESSED + BATCH))

            # A Pages Function processa no máximo 50 por chamada; um lote menor que
            # isso (incluindo 0, "No SVGs to generate") indica que não há mais trabalho.
            if [ "${BATCH}" -lt 50 ]; then
              echo "✅ No more SVGs to process, exiting loop"
              break
            fi

            sleep 5
          done

          END_TIME=$(date +%s)
          TOTAL_TIME=$((END_TIME - START_TIME))
          TOTAL_MIN=$((TOTAL_TIME / 60))
          TOTAL_SEC=$((TOTAL_TIME % 60))

          echo ""
          echo "🎉 Regeneration completed!"
          echo "📈 Total processed: ${PROCESSED} SVGs"
          echo "⏱️  Total time: ${TOTAL_MIN}m ${TOTAL_SEC}s"
